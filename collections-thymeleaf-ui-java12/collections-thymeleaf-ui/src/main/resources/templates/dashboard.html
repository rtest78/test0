<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Collections Daily Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #202124;
        }

        .container {
            max-width: 1800px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0 0 8px 0;
        }

        .card {
            background: white;
            border: 1px solid #dfe3e8;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .message {
            padding: 12px;
            margin-bottom: 16px;
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 5px;
        }

        .error {
            padding: 12px;
            margin-bottom: 16px;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            border-radius: 5px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            border: 1px solid #dfe3e8;
            padding: 10px;
            text-align: left;
            vertical-align: top;
            white-space: nowrap;
        }

        th {
            background: #eef2f7;
        }

        .button {
            display: inline-block;
            padding: 9px 14px;
            border: 0;
            border-radius: 5px;
            background: #1a73e8;
            color: white;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .secondary {
            background: #5f6368;
        }

        .filename {
            min-width: 280px;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .number-link {
            font-weight: bold;
            color: #1a73e8;
            text-decoration: none;
        }

        .missing-link {
            color: #b3261e;
        }

        .positive {
            color: #137333;
        }

        .negative {
            color: #b3261e;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <div>
            <h1>Collections Daily Dashboard</h1>

            <div>
                Data directory:
                <strong th:text="${dataDirectory}"></strong>
            </div>
        </div>

        <form th:action="@{/reload}"
              method="post">

            <button class="button secondary"
                    type="submit">

                Reload Files
            </button>
        </form>
    </div>

    <div class="message"
         th:if="${message}"
         th:text="${message}">
    </div>

    <div class="error"
         th:if="${error}"
         th:text="${error}">
    </div>

    <div class="card">

        <strong>Loaded business dates:</strong>

        <span th:text="${loadedDateCount}"></span>
    </div>

    <div class="card">

        <div class="table-wrapper"
             th:if="${summaries != null and !summaries.isEmpty()}">

            <table>

                <thead>
                <tr>
                    <th>Business Date</th>
                    <th>Members</th>
                    <th>Accounts</th>
                    <th>New Accounts</th>
                    <th>Missing Accounts</th>
                    <th>Changed Accounts</th>
                    <th>Balance Changed</th>
                    <th>Total Balance Change</th>
                    <th>Source Records</th>
                    <th>Source Files</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="summary : ${summaries}">

                    <td th:text="${summary.businessDate}"></td>

                    <td th:text="${summary.memberCount}"></td>

                    <td th:text="${summary.accountCount}"></td>

                    <td>
                        <a class="number-link"
                           th:if="${summary.newAccountCount > 0}"
                           th:href="@{/accounts(
                               date=${summary.businessDate},
                               status='NEW'
                           )}"
                           th:text="${summary.newAccountCount}">
                        </a>

                        <span th:if="${summary.newAccountCount == 0}">
                            0
                        </span>
                    </td>

                    <td>
                        <a class="number-link missing-link"
                           th:if="${summary.missingAccountCount > 0}"
                           th:href="@{/accounts(
                               date=${summary.businessDate},
                               status='MISSING'
                           )}"
                           th:text="${summary.missingAccountCount}">
                        </a>

                        <span th:if="${summary.missingAccountCount == 0}">
                            0
                        </span>
                    </td>

                    <td>
                        <a class="number-link"
                           th:if="${summary.changedAccountCount > 0}"
                           th:href="@{/accounts(
                               date=${summary.businessDate},
                               status='CHANGED'
                           )}"
                           th:text="${summary.changedAccountCount}">
                        </a>

                        <span th:if="${summary.changedAccountCount == 0}">
                            0
                        </span>
                    </td>

                    <td th:text="${summary.balanceChangedAccountCount}">
                    </td>

                    <td>
                        <span th:text="${summary.totalBalanceChange}"
                              th:classappend="${summary.totalBalanceChange != null
                                  and summary.totalBalanceChange.startsWith('-')}
                                  ? 'negative'
                                  : 'positive'">
                        </span>
                    </td>

                    <td th:text="${summary.sourceRecordCount}">
                    </td>

                    <td class="filename"
                        th:text="${summary.sourceFiles}">
                    </td>

                    <td>
                        <a class="button"
                           th:href="@{/accounts(
                               date=${summary.businessDate}
                           )}">

                            View Accounts
                        </a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

        <div class="empty"
             th:if="${summaries == null or summaries.isEmpty()}">

            No data files were loaded.
        </div>
    </div>
</div>

</body>
</html>
