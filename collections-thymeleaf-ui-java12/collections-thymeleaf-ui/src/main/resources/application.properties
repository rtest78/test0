<body>

<div class="container">

    <div class="header">

        <div>
            <h1>Member Account Flow</h1>

            <div class="subtitle">
                Member → Accounts → Dates → Delinquency →
                Past Due → Channel → Special Handling
            </div>
        </div>

        <div class="navigation">

            <a class="button secondary"
               th:href="@{/}">
                Dashboard
            </a>

            <a class="button secondary"
               th:href="@{/accounts}">
                Account Records
            </a>
        </div>
    </div>

    <div class="card">

        <form class="search-form"
              th:action="@{/member-flow}"
              method="get">

            <div>
                <label for="memberNumber">
                    Member Number
                </label>

                <input id="memberNumber"
                       name="memberNumber"
                       type="text"
                       placeholder="Enter exact member number"
                       th:value="${memberNumber}"
                       required>
            </div>

            <button class="button"
                    type="submit">

                Show Member Flow
            </button>
        </form>
    </div>

    <div class="card empty"
         th:if="${!searched}">

        Enter a member number to display every account
        across all available business dates.
    </div>

    <div class="card empty"
         th:if="${searched
             and (flow == null or !flow.found)}">

        No accounts were found for member:

        <strong th:text="${memberNumber}"></strong>
    </div>

    <div th:if="${searched
        and flow != null
        and flow.found}">

        <div class="member-node">

            <div class="member-title">

                Member:

                <span th:text="${flow.memberNumber}">
                </span>
            </div>

            <div class="member-summary">

                Total unique accounts:

                <strong th:text="${flow.accountCount}">
                </strong>

                &nbsp;|&nbsp;

                Dates reviewed:

                <strong th:text="${flow.availableDates.size()}">
                </strong>
            </div>
        </div>

        <div class="down-arrow">
            ↓ Accounts
        </div>

        <div class="account-node"
             th:each="accountFlow : ${flow.accountFlows}">

            <div class="account-header">

                <div class="account-title">

                    Account:

                    <span th:text="${accountFlow.accountNumber}">
                    </span>
                </div>

                <div class="account-counts">

                    Present on:

                    <strong th:text="${accountFlow.presentDateCount}">
                    </strong>

                    date(s)

                    &nbsp;|&nbsp;

                    Missing on:

                    <strong th:text="${accountFlow.missingDateCount}">
                    </strong>

                    date(s)
                </div>
            </div>

            <div class="timeline">

                <th:block th:each="dateFlow, loop : ${accountFlow.dateFlows}">

                    <div class="date-node"
                         th:classappend="${dateFlow.present}
                             ? 'present'
                             : 'missing'">

                        <div class="date-title"
                             th:text="${dateFlow.businessDate}">
                        </div>

                        <div th:if="${!dateFlow.present}">

                            <div class="missing-status"
                                 th:text="${dateFlow.displayMessage}">
                            </div>

                            <div class="previous-context"
                                 th:if="${dateFlow.previousKnownDate != null}">

                                <div class="field">

                                    <span class="field-label">
                                        Last available date
                                    </span>

                                    <span class="field-value"
                                          th:text="${dateFlow.previousKnownDate}">
                                    </span>
                                </div>

                                <div class="field">

                                    <span class="field-label">
                                        Previous known channel
                                    </span>

                                    <span class="field-value"
                                          th:text="${dateFlow.previousKnownChannel != null
                                              and dateFlow.previousKnownChannel != ''}
                                              ? ${dateFlow.previousKnownChannel}
                                              : '-'">
                                    </span>
                                </div>

                                <div class="field">

                                    <span class="field-label">
                                        Previous special handling
                                    </span>

                                    <span class="field-value"
                                          th:text="${dateFlow.previousKnownSpecialHandlingReasons != null
                                              and dateFlow.previousKnownSpecialHandlingReasons != ''}
                                              ? ${dateFlow.previousKnownSpecialHandlingReasons}
                                              : 'None'">
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div th:if="${dateFlow.present}">

                            <div class="present-status">
                                PRESENT
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Loan delinquent day count
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.loanDelinquentDayCount != null
                                          and dateFlow.loanDelinquentDayCount != ''}
                                          ? ${dateFlow.loanDelinquentDayCount}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Amount past due
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.amountPastDue != null
                                          and dateFlow.amountPastDue != ''}
                                          ? ${dateFlow.amountPastDue}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Account balance
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.accountBalance != null
                                          and dateFlow.accountBalance != ''}
                                          ? ${dateFlow.accountBalance}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Channel
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.channel != null
                                          and dateFlow.channel != ''}
                                          ? ${dateFlow.channel}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Special handling reasons
                                </span>

                                <div class="special-reason"
                                     th:text="${dateFlow.specialHandlingReasons != null
                                         and dateFlow.specialHandlingReasons != ''}
                                         ? ${dateFlow.specialHandlingReasons}
                                         : 'None'">
                                </div>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Account status
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.accountStatus != null
                                          and dateFlow.accountStatus != ''}
                                          ? ${dateFlow.accountStatus}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Action type
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.actionType != null
                                          and dateFlow.actionType != ''}
                                          ? ${dateFlow.actionType}
                                          : '-'">
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Response status
                                </span>

                                <span th:if="${dateFlow.responseAvailable}">
                                    Available
                                </span>

                                <span class="response-warning"
                                      th:if="${!dateFlow.responseAvailable}">
                                    Response wrapper not found
                                </span>
                            </div>

                            <div class="field">

                                <span class="field-label">
                                    Source
                                </span>

                                <span class="field-value"
                                      th:text="${dateFlow.sourceFile}">
                                </span>

                                <span>, line </span>

                                <span class="field-value"
                                      th:text="${dateFlow.sourceLine}">
                                </span>
                            </div>

                            <details>
                                <summary>
                                    Account JSON
                                </summary>

                                <pre th:text="${dateFlow.accountJson}"></pre>
                            </details>

                            <details>
                                <summary>
                                    Full Request
                                </summary>

                                <pre th:text="${dateFlow.requestJson}"></pre>
                            </details>

                            <details>
                                <summary>
                                    Response / Raw Output
                                </summary>

                                <pre th:text="${dateFlow.responseJson}"></pre>
                            </details>
                        </div>
                    </div>

                    <div class="flow-arrow"
                         th:if="${!loop.last}">
                        →
                    </div>

                </th:block>
            </div>
        </div>
    </div>
</div>

</body>
</html>



<a class="button secondary"
   th:href="@{/member-flow}">

    Member Flow
</a>
