package com.example.collections.service;

import com.example.collections.service.CollectionsDataService.AccountRecord;
import com.example.collections.service.CollectionsDataService.DailySnapshot;

import org.springframework.stereotype.Service;

import java.util.ArrayList;
import java.util.List;
import java.util.Map;
import java.util.Set;
import java.util.TreeSet;

@Service
public class MemberFlowService {

    private final CollectionsDataService collectionsDataService;

    public MemberFlowService(
            CollectionsDataService collectionsDataService) {

        this.collectionsDataService =
                collectionsDataService;
    }

    /**
     * Builds the complete date-by-date flow for one member.
     *
     * Structure:
     *
     * Member
     *   -> Account
     *       -> Date
     *           -> delinquent days
     *           -> amount past due
     *           -> account balance
     *           -> channel
     *           -> special handling reasons
     */
    public MemberFlowView buildMemberFlow(
            String memberNumber) {

        String normalizedMemberNumber =
                memberNumber == null
                        ? ""
                        : memberNumber.trim();

        MemberFlowView memberFlow =
                new MemberFlowView();

        memberFlow.setMemberNumber(
                normalizedMemberNumber
        );

        List<String> availableDates =
                collectionsDataService
                        .getAvailableDates();

        memberFlow.setAvailableDates(
                new ArrayList<String>(
                        availableDates
                )
        );

        if (normalizedMemberNumber.isEmpty()) {
            return memberFlow;
        }

        /*
         * Find every account ever associated with this
         * member across all loaded business dates.
         */
        Set<String> allAccountNumbers =
                new TreeSet<String>();

        for (String businessDate : availableDates) {

            DailySnapshot snapshot =
                    collectionsDataService
                            .getSnapshot(
                                    businessDate
                            );

            if (snapshot == null) {
                continue;
            }

            Map<String, AccountRecord> memberAccounts =
                    snapshot
                            .getAccountsByMember()
                            .get(
                                    normalizedMemberNumber
                            );

            if (memberAccounts != null) {

                allAccountNumbers.addAll(
                        memberAccounts.keySet()
                );
            }
        }

        /*
         * Build one account flow for every account that
         * has ever appeared for the selected member.
         */
        for (String accountNumber
                : allAccountNumbers) {

            AccountFlowView accountFlow =
                    new AccountFlowView();

            accountFlow.setAccountNumber(
                    accountNumber
            );

            AccountRecord previousPresentRecord =
                    null;

            for (String businessDate
                    : availableDates) {

                AccountRecord accountRecord =
                        findAccount(
                                businessDate,
                                normalizedMemberNumber,
                                accountNumber
                        );

                AccountDateFlow dateFlow =
                        new AccountDateFlow();

                dateFlow.setBusinessDate(
                        businessDate
                );

                dateFlow.setMemberNumber(
                        normalizedMemberNumber
                );

                dateFlow.setAccountNumber(
                        accountNumber
                );

                if (accountRecord == null) {

                    /*
                     * The account existed on another date,
                     * but is absent on this date.
                     */
                    dateFlow.setPresent(false);

                    dateFlow.setStatus(
                            "MISSING"
                    );

                    dateFlow.setDisplayMessage(
                            "MISSING ON THIS DATE"
                    );

                    /*
                     * Retain the most recent known channel and
                     * handling reasons for context.
                     */
                    if (previousPresentRecord != null) {

                        dateFlow.setPreviousKnownChannel(
                                previousPresentRecord
                                        .getChannel()
                        );

                        dateFlow.setPreviousKnownSpecialHandlingReasons(
                                previousPresentRecord
                                        .getSpecialHandlingReasons()
                        );

                        dateFlow.setPreviousKnownDate(
                                previousPresentRecord
                                        .getBusinessDate()
                        );
                    }

                } else {

                    dateFlow.setPresent(true);

                    dateFlow.setStatus(
                            "PRESENT"
                    );

                    dateFlow.setDisplayMessage(
                            "PRESENT"
                    );

                    dateFlow.setLoanDelinquentDayCount(
                            accountRecord
                                    .getLoanDelinquentDayCount()
                    );

                    dateFlow.setAmountPastDue(
                            accountRecord
                                    .getAmountPastDue()
                    );

                    dateFlow.setAccountBalance(
                            accountRecord
                                    .getAccountBalance()
                    );

                    dateFlow.setChannel(
                            accountRecord
                                    .getChannel()
                    );

                    dateFlow.setSpecialHandlingReasons(
                            accountRecord
                                    .getSpecialHandlingReasons()
                    );

                    dateFlow.setAccountStatus(
                            accountRecord
                                    .getAccountStatus()
                    );

                    dateFlow.setActionType(
                            accountRecord
                                    .getActionType()
                    );

                    dateFlow.setResponseAvailable(
                            accountRecord
                                    .isResponseAvailable()
                    );

                    dateFlow.setSourceFile(
                            accountRecord
                                    .getSourceFile()
                    );

                    dateFlow.setSourceLine(
                            accountRecord
                                    .getSourceLine()
                    );

                    dateFlow.setAccountJson(
                            accountRecord
                                    .getAccountJson()
                    );

                    dateFlow.setRequestJson(
                            accountRecord
                                    .getRequestJson()
                    );

                    dateFlow.setResponseJson(
                            accountRecord
                                    .getResponseJson()
                    );

                    previousPresentRecord =
                            accountRecord;
                }

                accountFlow
                        .getDateFlows()
                        .add(
                                dateFlow
                        );
            }

            memberFlow
                    .getAccountFlows()
                    .add(
                            accountFlow
                    );
        }

        return memberFlow;
    }

    private AccountRecord findAccount(
            String businessDate,
            String memberNumber,
            String accountNumber) {

        DailySnapshot snapshot =
                collectionsDataService
                        .getSnapshot(
                                businessDate
                        );

        if (snapshot == null) {
            return null;
        }

        Map<String, AccountRecord> memberAccounts =
                snapshot
                        .getAccountsByMember()
                        .get(memberNumber);

        if (memberAccounts == null) {
            return null;
        }

        return memberAccounts.get(
                accountNumber
        );
    }

    /*
     * =========================================================
     * VIEW CLASSES
     * =========================================================
     */

    public static class MemberFlowView {

        private String memberNumber;

        private List<String> availableDates =
                new ArrayList<String>();

        private List<AccountFlowView> accountFlows =
                new ArrayList<AccountFlowView>();

        public MemberFlowView() {
        }

        public String getMemberNumber() {
            return memberNumber;
        }

        public void setMemberNumber(
                String memberNumber) {

            this.memberNumber =
                    memberNumber;
        }

        public List<String> getAvailableDates() {
            return availableDates;
        }

        public void setAvailableDates(
                List<String> availableDates) {

            this.availableDates =
                    availableDates == null
                            ? new ArrayList<String>()
                            : availableDates;
        }

        public List<AccountFlowView> getAccountFlows() {
            return accountFlows;
        }

        public void setAccountFlows(
                List<AccountFlowView> accountFlows) {

            this.accountFlows =
                    accountFlows == null
                            ? new ArrayList<AccountFlowView>()
                            : accountFlows;
        }

        public int getAccountCount() {
            return accountFlows.size();
        }

        public boolean isFound() {
            return !accountFlows.isEmpty();
        }
    }

    public static class AccountFlowView {

        private String accountNumber;

        private List<AccountDateFlow> dateFlows =
                new ArrayList<AccountDateFlow>();

        public AccountFlowView() {
        }

        public String getAccountNumber() {
            return accountNumber;
        }

        public void setAccountNumber(
                String accountNumber) {

            this.accountNumber =
                    accountNumber;
        }

        public List<AccountDateFlow> getDateFlows() {
            return dateFlows;
        }

        public void setDateFlows(
                List<AccountDateFlow> dateFlows) {

            this.dateFlows =
                    dateFlows == null
                            ? new ArrayList<AccountDateFlow>()
                            : dateFlows;
        }

        public int getPresentDateCount() {

            int count = 0;

            for (AccountDateFlow dateFlow
                    : dateFlows) {

                if (dateFlow.isPresent()) {
                    count++;
                }
            }

            return count;
        }

        public int getMissingDateCount() {

            int count = 0;

            for (AccountDateFlow dateFlow
                    : dateFlows) {

                if (!dateFlow.isPresent()) {
                    count++;
                }
            }

            return count;
        }
    }

    public static class AccountDateFlow {

        private String businessDate;
        private String memberNumber;
        private String accountNumber;

        private boolean present;
        private String status;
        private String displayMessage;

        private String loanDelinquentDayCount;
        private String amountPastDue;
        private String accountBalance;

        private String channel;
        private String specialHandlingReasons;

        private String accountStatus;
        private String actionType;

        private boolean responseAvailable;

        private String sourceFile;
        private long sourceLine;

        private String accountJson;
        private String requestJson;
        private String responseJson;

        /*
         * Context shown when an account is missing.
         */
        private String previousKnownDate;
        private String previousKnownChannel;
        private String previousKnownSpecialHandlingReasons;

        public AccountDateFlow() {
        }

        public String getBusinessDate() {
            return businessDate;
        }

        public void setBusinessDate(
                String businessDate) {

            this.businessDate =
                    businessDate;
        }

        public String getMemberNumber() {
            return memberNumber;
        }

        public void setMemberNumber(
                String memberNumber) {

            this.memberNumber =
                    memberNumber;
        }

        public String getAccountNumber() {
            return accountNumber;
        }

        public void setAccountNumber(
                String accountNumber) {

            this.accountNumber =
                    accountNumber;
        }

        public boolean isPresent() {
            return present;
        }

        public void setPresent(
                boolean present) {

            this.present =
                    present;
        }

        public String getStatus() {
            return status;
        }

        public void setStatus(
                String status) {

            this.status =
                    status;
        }

        public String getDisplayMessage() {
            return displayMessage;
        }

        public void setDisplayMessage(
                String displayMessage) {

            this.displayMessage =
                    displayMessage;
        }

        public String getLoanDelinquentDayCount() {
            return loanDelinquentDayCount;
        }

        public void setLoanDelinquentDayCount(
                String loanDelinquentDayCount) {

            this.loanDelinquentDayCount =
                    loanDelinquentDayCount;
        }

        public String getAmountPastDue() {
            return amountPastDue;
        }

        public void setAmountPastDue(
                String amountPastDue) {

            this.amountPastDue =
                    amountPastDue;
        }

        public String getAccountBalance() {
            return accountBalance;
        }

        public void setAccountBalance(
                String accountBalance) {

            this.accountBalance =
                    accountBalance;
        }

        public String getChannel() {
            return channel;
        }

        public void setChannel(
                String channel) {

            this.channel =
                    channel;
        }

        public String getSpecialHandlingReasons() {
            return specialHandlingReasons;
        }

        public void setSpecialHandlingReasons(
                String specialHandlingReasons) {

            this.specialHandlingReasons =
                    specialHandlingReasons;
        }

        public String getAccountStatus() {
            return accountStatus;
        }

        public void setAccountStatus(
                String accountStatus) {

            this.accountStatus =
                    accountStatus;
        }

        public String getActionType() {
            return actionType;
        }

        public void setActionType(
                String actionType) {

            this.actionType =
                    actionType;
        }

        public boolean isResponseAvailable() {
            return responseAvailable;
        }

        public void setResponseAvailable(
                boolean responseAvailable) {

            this.responseAvailable =
                    responseAvailable;
        }

        public String getSourceFile() {
            return sourceFile;
        }

        public void setSourceFile(
                String sourceFile) {

            this.sourceFile =
                    sourceFile;
        }

        public long getSourceLine() {
            return sourceLine;
        }

        public void setSourceLine(
                long sourceLine) {

            this.sourceLine =
                    sourceLine;
        }

        public String getAccountJson() {
            return accountJson;
        }

        public void setAccountJson(
                String accountJson) {

            this.accountJson =
                    accountJson;
        }

        public String getRequestJson() {
            return requestJson;
        }

        public void setRequestJson(
                String requestJson) {

            this.requestJson =
                    requestJson;
        }

        public String getResponseJson() {
            return responseJson;
        }

        public void setResponseJson(
                String responseJson) {

            this.responseJson =
                    responseJson;
        }

        public String getPreviousKnownDate() {
            return previousKnownDate;
        }

        public void setPreviousKnownDate(
                String previousKnownDate) {

            this.previousKnownDate =
                    previousKnownDate;
        }

        public String getPreviousKnownChannel() {
            return previousKnownChannel;
        }

        public void setPreviousKnownChannel(
                String previousKnownChannel) {

            this.previousKnownChannel =
                    previousKnownChannel;
        }

        public String getPreviousKnownSpecialHandlingReasons() {
            return previousKnownSpecialHandlingReasons;
        }

        public void setPreviousKnownSpecialHandlingReasons(
                String previousKnownSpecialHandlingReasons) {

            this.previousKnownSpecialHandlingReasons =
                    previousKnownSpecialHandlingReasons;
        }
    }
}


package com.example.collections.controller;

import com.example.collections.service.MemberFlowService;
import com.example.collections.service.MemberFlowService.MemberFlowView;

import org.springframework.stereotype.Controller;
import org.springframework.ui.Model;
import org.springframework.web.bind.annotation.GetMapping;
import org.springframework.web.bind.annotation.RequestParam;

@Controller
public class MemberFlowController {

    private final MemberFlowService memberFlowService;

    public MemberFlowController(
            MemberFlowService memberFlowService) {

        this.memberFlowService =
                memberFlowService;
    }

    @GetMapping("/member-flow")
    public String memberFlow(
            @RequestParam(
                    name = "memberNumber",
                    required = false
            )
            String memberNumber,

            Model model) {

        String normalizedMemberNumber =
                memberNumber == null
                        ? ""
                        : memberNumber.trim();

        boolean searched =
                !normalizedMemberNumber.isEmpty();

        MemberFlowView flow =
                memberFlowService
                        .buildMemberFlow(
                                normalizedMemberNumber
                        );

        model.addAttribute(
                "memberNumber",
                normalizedMemberNumber
        );

        model.addAttribute(
                "searched",
                searched
        );

        model.addAttribute(
                "flow",
                flow
        );

        return "member-flow";
    }
}

