Collections.sort(
        views,
        new Comparator<AccountDayView>() {

            @Override
            public int compare(
                    AccountDayView first,
                    AccountDayView second) {

                String firstMember =
                        first == null
                                || first.getAccount() == null
                                ? ""
                                : first.getAccount().getMemberNumber();

                String secondMember =
                        second == null
                                || second.getAccount() == null
                                ? ""
                                : second.getAccount().getMemberNumber();

                int memberComparison =
                        firstMember.compareTo(secondMember);

                if (memberComparison != 0) {
                    return memberComparison;
                }

                String firstAccount =
                        first == null
                                || first.getAccount() == null
                                ? ""
                                : first.getAccount().getAccountNumber();

                String secondAccount =
                        second == null
                                || second.getAccount() == null
                                ? ""
                                : second.getAccount().getAccountNumber();

                return firstAccount.compareTo(secondAccount);
            }
        }
);
